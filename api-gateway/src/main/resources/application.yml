server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Global CORS configuration
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - X-Trace-Id

      # Default filters applied to all routes
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
        - AddRequestHeader=X-Gateway-Timestamp, ${spring.cloud.gateway.timestamp:0}

      routes:
        # Auth Service - Public endpoints (no JWT validation)
        - id: auth-service-public
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/login, /api/auth/register, /api/auth/refresh
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /api/auth/${segment}

        # Auth Service - Protected endpoints
        - id: auth-service-protected
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - AuthenticationFilter

        # Task Service - All endpoints require authentication
        - id: task-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/tasks/**
          filters:
            - AuthenticationFilter
            - RewritePath=/api/tasks/(?<segment>.*), /api/tasks/${segment}

        # Orchestrator Service (internal, usually not exposed)
        - id: orchestrator-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orchestrator/**
          filters:
            - AuthenticationFilter

        # Health endpoints - no auth required
        - id: health
          uri: http://localhost:8081
          predicates:
            - Path=/health
          filters:
            - RewritePath=/health, /actuator/health

# Auth service URL for token validation
auth:
  service:
    url: http://localhost:8081
    validate-endpoint: /api/auth/validate

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      show-details: when_authorized
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    root: INFO
    com.taskplatform.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] %-5level %logger{36} - %msg%n"

# Resilience4j Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      authService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
  timelimiter:
    instances:
      authService:
        timeoutDuration: 3s

---
# Docker profile
spring:
  config:
    activate:
      on-profile: docker

  cloud:
    gateway:
      routes:
        - id: auth-service-public
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/login, /api/auth/register, /api/auth/refresh

        - id: auth-service-protected
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - AuthenticationFilter

        - id: task-service
          uri: http://task-service:8082
          predicates:
            - Path=/api/tasks/**
          filters:
            - AuthenticationFilter

        - id: orchestrator-service
          uri: http://orchestrator-service:8083
          predicates:
            - Path=/api/orchestrator/**
          filters:
            - AuthenticationFilter

        - id: health
          uri: http://auth-service:8081
          predicates:
            - Path=/health
          filters:
            - RewritePath=/health, /actuator/health

auth:
  service:
    url: http://auth-service:8081

logging:
  level:
    root: INFO
    com.taskplatform.gateway: INFO
